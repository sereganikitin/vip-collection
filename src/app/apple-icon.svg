<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="geometricPrecision">
  <!-- White rounded background -->
  <rect width="180" height="180" rx="34" fill="#ffffff"/>

  <!-- Suitcase handle -->
  <path d="M62 40 Q62 26 76 26 L104 26 Q118 26 118 40 L118 50"
        stroke="#62221C" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Suitcase body -->
  <rect x="22" y="48" width="136" height="112" rx="12" fill="#62221C"/>

  <!-- Top highlight -->
  <rect x="22" y="48" width="136" height="8" rx="4" fill="#7a2e26"/>

  <!-- Gold belt -->
  <rect x="22" y="92" width="136" height="16" fill="#FBC608"/>

  <!-- Buckle -->
  <rect x="74" y="88" width="32" height="24" rx="3" fill="#FBC608" stroke="#62221C" stroke-width="3"/>
  <rect x="83" y="96" width="14" height="8" rx="1" fill="#62221C"/>

  <!-- Corner protectors -->
  <rect x="22" y="48" width="16" height="16" fill="#FBC608" opacity="0.92"/>
  <rect x="142" y="48" width="16" height="16" fill="#FBC608" opacity="0.92"/>
  <rect x="22" y="144" width="16" height="16" fill="#FBC608" opacity="0.92"/>
  <rect x="142" y="144" width="16" height="16" fill="#FBC608" opacity="0.92"/>

  <!-- Wheels -->
  <circle cx="48" cy="166" r="6" fill="#2d1a17"/>
  <circle cx="132" cy="166" r="6" fill="#2d1a17"/>
</svg>
